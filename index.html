<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Resorte Helicoidal</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>

    <header>
        <h1>Simulador de Resorte Helicoidal</h1>
    </header>

    <main>

        <!-- Área de simulación -->
        <section class="simulation-container">
            <canvas id="simulationCanvas" width="900" height="600"></canvas>
        </section>

        <!-- Panel de controles -->
        <aside class="controls-panel">

            <h2>Parámetros</h2>

            <div class="control-group">
                <label for="mass">
                    Masa (kg):
                    <span id="massValue">1.0</span>
                </label>
                <input
                    type="range"
                    id="mass"
                    min="0.1"
                    max="10"
                    step="0.1"
                    value="1"
                >
            </div>

            <div class="control-group">
                <label for="springConstant">
                    Constante k (N/m):
                    <span id="springConstantValue">50</span>
                </label>
                <input
                    type="range"
                    id="springConstant"
                    min="10"
                    max="300"
                    step="1"
                    value="50"
                >
            </div>

            <div class="control-group">
                <label for="damping">
                    Amortiguamiento:
                    <span id="dampingValue">0.5</span>
                </label>
                <input
                    type="range"
                    id="damping"
                    min="0"
                    max="10"
                    step="0.1"
                    value="0.5"
                >
            </div>

            <div class="control-group">
                <label for="gravity">
                    Gravedad (m/s²):
                    <span id="gravityValue">9.81</span>
                </label>
                <input
                    type="range"
                    id="gravity"
                    min="0"
                    max="20"
                    step="0.01"
                    value="9.81"
                >
            </div>

            <hr>

            <div class="buttons">
                <button id="startBtn">Iniciar</button>
                <button id="pauseBtn">Pausar</button>
                <button id="resetBtn">Reiniciar</button>
            </div>

            <hr>

            <div class="info-panel">
                <p><strong>Posición:</strong> <span id="positionDisplay">0.00</span> m</p>
                <p><strong>Velocidad:</strong> <span id="velocityDisplay">0.00</span> m/s</p>
                <p><strong>Aceleración:</strong> <span id="accelerationDisplay">0.00</span> m/s²</p>
            </div>

        </aside>

    </main>

    
<!-- BOTÓN IA -->
<button id="ai-chat-button">🤖</button>

<!-- CHAT -->
<div id="ai-chat-window">

    <div class="ai-chat-header">
        <h3>Asistente de Física</h3>
        <button id="close-chat">×</button>
    </div>

    <div id="ai-chat-messages">
        <div class="ai-message">
            Hola 👋. Pregúntame sobre resortes, Ley de Hooke, frecuencia, energía o sobre esta simulación.
        </div>
    </div>

    <div class="ai-chat-input-area">
        <input
            type="text"
            id="ai-chat-input"
            placeholder="Escribe tu pregunta..."
        >

        <button id="send-ai-message">
            Enviar
        </button>
    </div>

</div>
<script type="module" src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
